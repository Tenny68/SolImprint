<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SolImprint | The Intimate Clarity Journal</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --plum:       #1a0a2e;
      --violet:     #2d0c4e;
      --orchid:     #7b2d8b;
      --bloom:      #c9607a;
      --petal:      #f2b8c6;
      --cream:      #fdf0f4;
      --gold:       #d4a96a;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      background-color: var(--plum);
      color: var(--cream);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Petal canvas ── */
    #petals { position: fixed; inset: 0; pointer-events: none; z-index: 0; }

    .petal {
      position: absolute;
      top: -60px;
      border-radius: 50% 0 50% 0;
      opacity: 0;
      animation: fall linear infinite;
    }

    @keyframes fall {
      0%   { transform: translateY(0) rotate(0deg); opacity: 0; }
      5%   { opacity: .6; }
      90%  { opacity: .4; }
      100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }

    /* ── Radial glow background ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 55% at 50% -5%, #7b2d8b55 0%, transparent 70%),
        radial-gradient(ellipse 45% 35% at 85% 80%, #c9607a33 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 10% 90%, #2d0c4ebb 0%, transparent 70%);
      z-index: 0;
      pointer-events: none;
    }

    /* ── Layout ── */
    main {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 24px 80px;
      gap: 0;
    }

    /* ── Logo area ── */
    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      opacity: 0;
      animation: riseIn .9s ease forwards .1s;
    }

    .logo-mark {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 1.5px solid var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle, #3d1060 0%, #1a0a2e 100%);
      box-shadow: 0 0 28px #7b2d8b66;
    }

    .logo-mark svg { width: 36px; height: 36px; }

    .brand-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.1rem, 3vw, 1.35rem);
      font-weight: 300;
      letter-spacing: .35em;
      text-transform: uppercase;
      color: var(--gold);
    }

    /* ── Divider line ── */
    .divider {
      width: 1px;
      height: 48px;
      background: linear-gradient(to bottom, transparent, var(--petal), transparent);
      margin: 28px auto;
      opacity: 0;
      animation: riseIn .7s ease forwards .35s;
    }

    /* ── Tagline ── */
    .tagline {
      text-align: center;
      opacity: 0;
      animation: riseIn .9s ease forwards .45s;
    }

    .tagline h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.9rem, 6vw, 3.2rem);
      font-weight: 400;
      font-style: italic;
      line-height: 1.25;
      color: var(--cream);
      letter-spacing: .01em;
    }

    .tagline .heart {
      display: block;
      font-style: normal;
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1rem, 3vw, 1.3rem);
      font-weight: 300;
      letter-spacing: .2em;
      color: var(--petal);
      margin-top: 8px;
    }

    /* ── Product image ── */
    .product-wrap {
      margin: 44px auto 0;
      opacity: 0;
      animation: riseIn 1s ease forwards .65s;
      position: relative;
    }

    .product-frame {
      width: clamp(200px, 56vw, 280px);
      aspect-ratio: 3/4;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid #7b2d8b88;
      box-shadow:
        0 0 0 1px #c9607a22,
        0 20px 60px #00000088,
        0 0 80px #7b2d8b44;
      position: relative;
    }

    /* placeholder — swap <img> in once you have the cover file */
    .product-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .product-placeholder {
      width: 100%;
      height: 100%;
      background: linear-gradient(160deg, #3d1060 0%, #1a0a2e 50%, #2d0c4e 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 24px;
      text-align: center;
    }

    .product-placeholder .ph-icon { font-size: 2.4rem; }

    .product-placeholder p {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      font-style: italic;
      color: var(--petal);
      line-height: 1.5;
    }

    /* glow ring around image */
    .product-wrap::after {
      content: '';
      position: absolute;
      inset: -18px;
      border-radius: 22px;
      background: radial-gradient(ellipse, #c9607a22 0%, transparent 70%);
      z-index: -1;
    }

    /* ── Store label ── */
    .store-label {
      margin: 48px 0 22px;
      text-align: center;
      opacity: 0;
      animation: riseIn .8s ease forwards .85s;
    }

    .store-label p {
      font-size: .72rem;
      letter-spacing: .28em;
      text-transform: uppercase;
      color: var(--petal);
    }

    /* ── Buttons ── */
    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 100%;
      max-width: 320px;
      opacity: 0;
      animation: riseIn .8s ease forwards 1s;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 15px 28px;
      border-radius: 50px;
      font-family: 'Jost', sans-serif;
      font-size: .88rem;
      font-weight: 400;
      letter-spacing: .12em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      transition: transform .25s ease, box-shadow .25s ease, background .25s ease;
      position: relative;
      overflow: hidden;
    }

    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: white;
      opacity: 0;
      transition: opacity .2s;
      border-radius: inherit;
    }

    .btn:hover::after { opacity: .06; }

    .btn:hover {
      transform: translateY(-3px);
    }

    .btn-payhip {
      background: linear-gradient(135deg, var(--orchid) 0%, var(--bloom) 100%);
      color: var(--cream);
      box-shadow: 0 8px 30px #c9607a55;
    }

    .btn-payhip:hover {
      box-shadow: 0 14px 40px #c9607a77;
    }

    .btn-gumroad {
      background: transparent;
      color: var(--petal);
      border: 1px solid var(--petal);
      box-shadow: inset 0 0 0 0 var(--bloom);
      transition: transform .25s ease, box-shadow .25s ease, color .25s ease, border-color .25s;
    }

    .btn-gumroad:hover {
      border-color: var(--bloom);
      color: var(--cream);
      box-shadow: 0 8px 30px #c9607a44;
    }

    .btn-icon { font-size: 1rem; flex-shrink: 0; }

    /* ── Footer ── */
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 24px;
      font-size: .68rem;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: #7b2d8b99;
    }

    /* ── Keyframes ── */
    @keyframes riseIn {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Responsive ── */
    @media (min-width: 520px) {
      .btn-group { flex-direction: row; max-width: 500px; }
      .btn { flex: 1; }
    }
  </style>
</head>
<body>

<!-- Falling petals canvas -->
<canvas id="petals"></canvas>

<main>

  <!-- LOGO -->
  <div class="logo-wrap">
    <div class="logo-mark">
      <!-- Simple SVG Sol mark — replace with your actual logo image if you have one -->
      <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="18" cy="18" r="7" stroke="#d4a96a" stroke-width="1.2"/>
        <line x1="18" y1="2" x2="18" y2="8"  stroke="#d4a96a" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="18" y1="28" x2="18" y2="34" stroke="#d4a96a" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="2"  y1="18" x2="8"  y2="18" stroke="#d4a96a" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="28" y1="18" x2="34" y2="18" stroke="#d4a96a" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="6.8"  y1="6.8"  x2="11.2" y2="11.2" stroke="#d4a96a" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="24.8" y1="24.8" x2="29.2" y2="29.2" stroke="#d4a96a" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="29.2" y1="6.8"  x2="24.8" y2="11.2" stroke="#d4a96a" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="11.2" y1="24.8" x2="6.8"  y2="29.2" stroke="#d4a96a" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
    </div>
    <span class="brand-name">SolImprint</span>
  </div>

  <div class="divider"></div>

  <!-- TAGLINE -->
  <div class="tagline">
    <h1>The Intimate<br>Clarity Journal</h1>
    <span class="heart">The Intimate Experience ♥</span>
  </div>

  <!-- PRODUCT IMAGE -->
  <div class="product-wrap">
    <div class="product-frame">
      <!--
        TO ADD YOUR COVER:
        Replace the .product-placeholder div below with:
        <img src="cover.jpg" alt="The Intimate Clarity Journal Cover" />
        (make sure cover.jpg is in the same folder as this index.html)
      -->
      <div class="product-placeholder">
        <span class="ph-icon">🌸</span>
        <p>The Intimate<br>Clarity Journal</p>
      </div>
    </div>
  </div>

  <!-- STORE BUTTONS -->
  <div class="store-label">
    <p>Available now on</p>
  </div>

  <div class="btn-group">
    <a class="btn btn-payhip"
       href="https://payhip.com/b/mCxnK"
       target="_blank" rel="noopener noreferrer">
      <span class="btn-icon">🛒</span> Buy on Payhip
    </a>
    <a class="btn btn-gumroad"
       href="https://solimprint.gumroad.com/l/The-Intimate-Clarity-Journal"
       target="_blank" rel="noopener noreferrer">
      <span class="btn-icon">✦</span> Buy on Gumroad
    </a>
  </div>

</main>

<footer>
  © 2025 SolImprint · Tenny | SolJournal · All rights reserved
</footer>

<script>
  // ── Falling cherry blossom petals ──
  (function () {
    const canvas = document.getElementById('petals');
    const ctx    = canvas.getContext('2d');
    const petals = [];
    const COUNT  = 28;

    function resize () {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const COLORS = ['#f2b8c6','#e8a0b8','#c9607a','#f7d4e0','#d4a96a'];

    function makePetal () {
      return {
        x:     Math.random() * canvas.width,
        y:     Math.random() * -200,
        size:  Math.random() * 9 + 5,
        speed: Math.random() * .6 + .3,
        drift: Math.random() * .8 - .4,
        rot:   Math.random() * Math.PI * 2,
        rotV:  (Math.random() - .5) * .04,
        color: COLORS[Math.floor(Math.random() * COLORS.length)],
        alpha: Math.random() * .45 + .15,
      };
    }

    for (let i = 0; i < COUNT; i++) {
      const p = makePetal();
      p.y = Math.random() * canvas.height; // scatter on load
      petals.push(p);
    }

    function draw () {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      petals.forEach(p => {
        ctx.save();
        ctx.globalAlpha = p.alpha;
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.beginPath();
        ctx.ellipse(0, 0, p.size, p.size * .55, 0, 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.fill();
        ctx.restore();

        p.y   += p.speed;
        p.x   += p.drift;
        p.rot += p.rotV;

        if (p.y > canvas.height + 30) {
          Object.assign(p, makePetal());
        }
      });
      requestAnimationFrame(draw);
    }
    draw();
  })();
</script>

</body>
</html>
